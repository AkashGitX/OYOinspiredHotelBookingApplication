<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <a href="/" class="flex items-center gap-2">
                <div class="bg-red-600 text-white font-bold text-xl px-3 py-1 rounded-lg">OYO</div>
                <span class="text-gray-700 font-semibold hidden sm:block">Hotel Booking</span>
            </a>
            <div class="hidden md:flex items-center gap-6">
                <a href="/" class="text-gray-600 hover:text-red-600 font-medium transition">Hotels</a>
                <div id="nav-user-links" class="hidden flex items-center gap-4">
                    <a href="/profile" class="text-gray-600 hover:text-red-600 font-medium transition">My Trips</a>
                </div>
                <div id="nav-owner-links" class="hidden flex items-center gap-4">
                    <a href="/owner/dashboard" class="text-gray-600 hover:text-red-600 font-medium transition">My Hotels</a>
                </div>
                <div id="nav-auth-buttons" class="flex items-center gap-3">
                    <a href="/login" class="text-gray-700 hover:text-red-600 font-medium">Sign In</a>
                    <a href="/register" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 font-medium transition">Sign Up</a>
                </div>
                <div id="nav-user-menu" class="hidden items-center gap-3">
                    <div class="relative group">
                        <button class="flex items-center gap-2 text-gray-700 hover:text-red-600 font-medium">
                            <div class="w-8 h-8 bg-red-100 text-red-600 rounded-full flex items-center justify-center font-bold text-sm" id="nav-avatar">U</div>
                            <span id="nav-user-name">User</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <div class="absolute right-0 top-12 bg-white shadow-xl rounded-xl w-48 py-2 opacity-0 group-hover:opacity-100 pointer-events-none group-hover:pointer-events-auto transition-all duration-200 border border-gray-100">
                            <a href="/profile" class="flex items-center gap-2 px-4 py-2 text-gray-700 hover:bg-red-50 hover:text-red-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                My Profile
                            </a>
                            <a href="/owner/dashboard" id="nav-owner-link" class="hidden items-center gap-2 px-4 py-2 text-gray-700 hover:bg-red-50 hover:text-red-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                                Owner Dashboard
                            </a>
                            <hr class="my-1 border-gray-100">
                            <button onclick="logout()" class="w-full flex items-center gap-2 px-4 py-2 text-red-600 hover:bg-red-50">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                                Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Mobile menu button -->
            <button id="mobile-menu-btn" class="md:hidden text-gray-600 hover:text-red-600" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white">
        <div class="px-4 py-3 space-y-2">
            <a href="/" class="block text-gray-700 hover:text-red-600 py-2">Hotels</a>
            <a href="/profile" class="block text-gray-700 hover:text-red-600 py-2">My Trips</a>
            <a href="/login" class="block text-gray-700 hover:text-red-600 py-2" id="mob-login">Sign In</a>
            <button onclick="logout()" class="block text-red-600 py-2 hidden" id="mob-logout">Sign Out</button>
        </div>
    </div>
</nav>

<script th:inline="none">
function updateNavbar() {
    const token = localStorage.getItem('oyo_token');
    const user = JSON.parse(localStorage.getItem('oyo_user') || 'null');
    const authButtons = document.getElementById('nav-auth-buttons');
    const userMenu = document.getElementById('nav-user-menu');
    const navUserLinks = document.getElementById('nav-user-links');
    const navOwnerLinks = document.getElementById('nav-owner-links');
    const navOwnerLink = document.getElementById('nav-owner-link');
    const mobLogin = document.getElementById('mob-login');
    const mobLogout = document.getElementById('mob-logout');

    if (token && user) {
        authButtons.classList.add('hidden');
        userMenu.classList.remove('hidden');
        userMenu.classList.add('flex');
        const avatar = document.getElementById('nav-avatar');
        const nameEl = document.getElementById('nav-user-name');
        if (avatar) avatar.textContent = (user.fullName || user.email || 'U')[0].toUpperCase();
        if (nameEl) nameEl.textContent = user.fullName || user.email;
        if (mobLogin) mobLogin.classList.add('hidden');
        if (mobLogout) { mobLogout.classList.remove('hidden'); mobLogout.classList.add('block'); }
        if (user.role === 'HOTEL_OWNER') {
            if (navOwnerLinks) { navOwnerLinks.classList.remove('hidden'); navOwnerLinks.classList.add('flex'); }
            if (navOwnerLink) { navOwnerLink.classList.remove('hidden'); navOwnerLink.classList.add('flex'); }
        } else {
            if (navUserLinks) { navUserLinks.classList.remove('hidden'); navUserLinks.classList.add('flex'); }
        }
    }
}
function logout() {
    localStorage.removeItem('oyo_token');
    localStorage.removeItem('oyo_user');
    window.location.href = '/login';
}
document.addEventListener('DOMContentLoaded', updateNavbar);
</script>
</body>
</html>
