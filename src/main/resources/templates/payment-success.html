<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Payment Successful - OYO Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">

        <!-- Animated checkmark -->
        <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 animate-bounce">
            <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <h1 class="text-3xl font-bold text-gray-800 mb-2">Payment Successful!</h1>
        <p class="text-gray-500 mb-6">Your booking has been confirmed</p>

        <div class="bg-green-50 border border-green-200 rounded-2xl p-5 mb-6 text-left">
            <div class="space-y-3">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Booking ID</span>
                    <span class="font-bold text-gray-800 font-mono" id="booking-ref">—</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Status</span>
                    <span class="font-bold text-green-600 bg-green-100 px-2 py-0.5 rounded-full text-xs">CONFIRMED</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Hotel</span>
                    <span class="font-semibold text-gray-800" id="hotel-name">—</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Amount Paid</span>
                    <span class="font-bold text-gray-800" id="amount-paid">—</span>
                </div>
            </div>
        </div>

        <div class="bg-blue-50 rounded-xl p-4 mb-6">
            <p class="text-sm text-blue-600">
                A confirmation has been saved to your profile.
                You'll be redirected automatically in <span id="countdown" class="font-bold">3</span> seconds...
            </p>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="redirectNow()"
                    class="bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition text-sm">
                Go to Profile
            </button>
            <a href="/"
               class="border-2 border-gray-200 text-gray-700 py-3 rounded-xl font-bold hover:border-red-300 hover:text-red-600 transition text-sm text-center block">
                Browse More
            </a>
        </div>

    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");
    const bookingId = sessionStorage.getItem("lastBookingId");
    const token = localStorage.getItem("oyo_token");
    const user = JSON.parse(localStorage.getItem("oyo_user") || "{}");

    // confirm payment via API using sessionId
    if (sessionId && token) {
        fetch(`/api/payments/success?session_id=${sessionId}`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(r => r.json())
            .then(data => console.log("Payment confirmed"))
            .catch(e => console.error("Payment confirmation error", e));
    }

    // show booking reference
    document.getElementById('booking-ref').textContent =
        bookingId ? `#${bookingId}` : '—';

    // load booking details
    if (bookingId && token) {
        fetch(`/api/bookings/${bookingId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('hotel-name').textContent =
                        data.data.hotelName || '—';
                    document.getElementById('amount-paid').textContent =
                        `₹${Number(data.data.totalPrice).toLocaleString('en-IN')}`;
                }
            })
            .catch(() => {});
    }

    // redirect logic
    function redirectNow() {
        const role = user.role;
        window.location.href =
            role === 'HOTEL_OWNER'
                ? '/owner/dashboard'
                : '/profile';
    }

    // auto redirect countdown
    let count = 3;
    const cd = document.getElementById('countdown');

    const timer = setInterval(() => {
        count--;
        cd.textContent = count;
        if (count <= 0) {
            clearInterval(timer);
            redirectNow();
        }
    }, 1000);
</script>

</body>
</html>
