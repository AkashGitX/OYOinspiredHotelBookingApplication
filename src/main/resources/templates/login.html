<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In - OYO Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-red-50 to-orange-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
        <a href="/" class="inline-flex items-center gap-2">
            <div class="bg-red-600 text-white font-bold text-2xl px-4 py-2 rounded-xl">OYO</div>
        </a>
        <h1 class="mt-4 text-2xl font-bold text-gray-800">Welcome back</h1>
        <p class="text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                       placeholder="you@example.com"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                           placeholder="Enter your password"/>
                    <button type="button" onclick="togglePass()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" id="submit-btn"
                    class="w-full bg-red-600 text-white py-3 rounded-xl font-semibold hover:bg-red-700 transition flex items-center justify-center gap-2">
                <span id="btn-text">Sign In</span>
                <svg id="btn-spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-500 text-sm">Don't have an account?
                <a href="/register" class="text-red-600 font-semibold hover:underline">Sign up</a>
            </p>
        </div>

        <!-- Demo credentials -->
        <div class="mt-6 p-4 bg-gray-50 rounded-xl">
            <p class="text-xs font-semibold text-gray-500 mb-2">DEMO CREDENTIALS</p>
            <div class="space-y-1 text-xs text-gray-600">
                <div class="flex justify-between">
                    <span>Hotel Owner:</span>
                    <span class="font-mono cursor-pointer" onclick="fillCreds('owner@oyo.com','password123')">owner@oyo.com / password123</span>
                </div>
                <div class="flex justify-between">
                    <span>User:</span>
                    <span class="font-mono cursor-pointer" onclick="fillCreds('user@oyo.com','password123')">user@oyo.com / password123</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePass() {
    const p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
}
function fillCreds(email, pass) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pass;
}
function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
}
function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    const text = document.getElementById('btn-text');
    const spinner = document.getElementById('btn-spinner');
    btn.disabled = loading;
    text.textContent = loading ? 'Signing in...' : 'Sign In';
    spinner.classList.toggle('hidden', !loading);
}

// Redirect if already logged in
if (localStorage.getItem('oyo_token')) {
    const user = JSON.parse(localStorage.getItem('oyo_user') || '{}');
    window.location.href = user.role === 'HOTEL_OWNER' ? '/owner/dashboard' : '/';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('error-msg').classList.add('hidden');
    setLoading(true);
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('oyo_token', data.data.token);
            localStorage.setItem('oyo_user', JSON.stringify(data.data));
            window.location.href = data.data.role === 'HOTEL_OWNER' ? '/owner/dashboard' : '/';
        } else {
            showError(data.message || 'Invalid email or password');
        }
    } catch (err) {
        showError('Network error. Please try again.');
    } finally {
        setLoading(false);
    }
});
</script>
</body>
</html>
