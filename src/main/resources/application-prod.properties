spring.application.name=OYOclone

# ===============================
# DATABASE (FROM ENV VARIABLE)
# ===============================

spring.datasource.url=jdbc:postgresql://postgres.railway.internal:5432/railway
#spring.datasource.url=${DB_URL}
spring.datasource.username=postgres
spring.datasource.password=oQRpqQJQYKNuFlgBIWxwuqOimwJoVrHz
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.port=${PORT:8080}

# ===============================
# JWT
# ===============================
jwt.secret=oyo-clone-jwt-secret-key-must-be-at-least-256-bits-long-for-security
jwt.expiration=86400000

# ===============================
# STRIPE
# ===============================
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY}

#stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:YOUR_WEBHOOK_SECRET_HERE}

logging.level.com.oyo.clone=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN